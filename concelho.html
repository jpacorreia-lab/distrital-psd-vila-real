/* ── Helpers ───────────────────────────────────────────── */
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'cls') el.className = v;
    else if (k === 'html') el.innerHTML = v;
    else el.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (c == null) return;
    if (typeof c === 'string' || typeof c === 'number') {
      el.appendChild(document.createTextNode(String(c)));
    } else {
      el.appendChild(c);
    }
  });
  return el;
}

function fmt(n) {
  if (n == null) return null;
  return String(n).includes('.') || String(n).includes(',') ? n : Number(n).toLocaleString('pt-PT');
}

function dataRow(lbl, val, cls) {
  if (val == null) return null;
  return h('div', { cls: 'data-row' },
    h('span', { cls: 'data-lbl' }, lbl),
    h('span', { cls: 'data-val' + (cls ? ' ' + cls : '') }, String(val))
  );
}

  const crescCls = isPos ? 'pos' : 'neg';

  /* Hero */
  const hero = h('section', { cls: 'hero', 'aria-labelledby': 'h-nome' });
  const hCont = h('div', { cls: 'container' });
  hCont.appendChild(h('a', { href: 'index.html#concelhos', cls: 'back-link', 'aria-label': 'Voltar ao distrito' }, '← Voltar ao distrito'));
  hCont.appendChild(h('span', { cls: 'nuts-chip' }, 'NUTS III: ' + d.nuts));
  hCont.appendChild(h('h1', { cls: 'hero-nome', id: 'h-nome' }, nome));
  hCont.appendChild(h('p', { cls: 'hero-sub' }, fmt(d.pop) + ' habitantes · ' + d.area + ' km²'));

  const ks = h('div', { cls: 'key-stats', role: 'list', 'aria-label': 'Indicadores chave' });
  [
    { val: fmt(d.pop),                 lbl: 'Habitantes',      cls: '' },
    { val: (isPos ? '↑ ' : '↓ ') + crescStr, lbl: 'Crescimento anual', cls: crescCls },
    { val: d.dens.toFixed(1).replace('.',','), lbl: 'Hab./km²',    cls: '' },
    { val: Math.round(d.envelh),       lbl: 'Índice envelhecimento', cls: '' },
  ].forEach(s => {
    ks.appendChild(h('div', { cls: 'key-stat', role: 'listitem' },
      h('div', { cls: 'key-stat-val ' + s.cls }, s.val),
      h('div', { cls: 'key-stat-lbl' }, s.lbl)
    ));
  });
  hCont.appendChild(ks);
  hero.appendChild(hCont);
  wrap.appendChild(hero);

  /* Main */
  const main = h('main', { cls: 'main container' });

  /* Destaque */
  const dest = h('div', { cls: 'destaque', role: 'note', 'aria-label': 'Destaque' });
  dest.appendChild(h('div', { cls: 'destaque-icon', 'aria-hidden': 'true' }, '★'));
  dest.appendChild(h('p', { cls: 'destaque-txt', html: d.destaque }));
  main.appendChild(dest);

  /* Sections grid */
  const grid = h('div', { cls: 'sections-grid' });

  /* — DEMOGRAFIA — */
  const demSec = h('div', { cls: 'sec-card', role: 'region', 'aria-labelledby': 'sec-dem' });
  demSec.appendChild(h('div', { cls: 'sec-card-head' },
    h('div', { cls: 'sec-badge', 'aria-hidden': 'true' }, '👥'),
    h('div', {},
      h('div', { cls: 'sec-title', id: 'sec-dem' }, 'Demografia'),
      h('div', { cls: 'sec-subtitle' }, 'Dados INE 2024')
    )
  ));
  [
    dataRow('População residente', fmt(d.pop) + ' hab.'),
    dataRow('Densidade populacional', d.dens.toFixed(1).replace('.',',') + ' hab./km²'),
    dataRow('Área', d.area + ' km²'),
    dataRow('Crescimento populacional', (isPos ? '+' : '') + d.cresc.toFixed(1).replace('.',',') + '%', crescCls),
    dataRow('Índice de envelhecimento', String(d.envelh).replace('.', ',')),
    dataRow('Nados vivos (2024)', fmt(d.nasc)),
    dataRow('Óbitos (2024)', fmt(d.obitos)),
    dataRow('Saldo natural', fmt(d.nasc - d.obitos)),
  ].forEach(r => r && demSec.appendChild(r));
  grid.appendChild(demSec);

  /* — TURISMO — */
  const turSec = h('div', { cls: 'sec-card', role: 'region', 'aria-labelledby': 'sec-tur' });
  turSec.appendChild(h('div', { cls: 'sec-card-head' },
    h('div', { cls: 'sec-badge', 'aria-hidden': 'true' }, '🏨'),
    h('div', {},
      h('div', { cls: 'sec-title', id: 'sec-tur' }, 'Turismo'),
      h('div', { cls: 'sec-subtitle' }, 'Estabelecimentos e dormidas')
    )
  ));
  [
    dataRow('Estabelecimentos hoteleiros', d.hoteis + (d.hoteis_det ? ' (' + d.hoteis_det + ')' : '')),
    dataRow('Capacidade (camas)', fmt(d.camas)),
    dataRow('Hóspedes', fmt(d.hospedes)),
    dataRow('Dormidas', fmt(d.dormidas), 'accent'),
    dataRow('Proveitos hoteleiros', d.receitas + ' mil €'),
    dataRow('Hóspedes estrangeiros', d.estrang != null ? d.estrang + '%' : null),
  ].forEach(r => r && turSec.appendChild(r));
  grid.appendChild(turSec);

  /* — ECONOMIA — */
  const ecSec = h('div', { cls: 'sec-card', role: 'region', 'aria-labelledby': 'sec-ec' });
  ecSec.appendChild(h('div', { cls: 'sec-card-head' },
    h('div', { cls: 'sec-badge', 'aria-hidden': 'true' }, '📊'),
    h('div', {},
      h('div', { cls: 'sec-title', id: 'sec-ec' }, 'Economia'),
      h('div', { cls: 'sec-subtitle' }, 'Volume de negócios e emprego')
    )
  ));
  [
    dataRow('Volume de negócios', d.volneg + 'M€', 'accent'),
    dataRow('VAB', d.vab != null ? d.vab + 'M€' : null),
    dataRow('Trabalhadores', fmt(d.trabalhadores)),
    dataRow('Exportações', d.exportacoes != null ? d.exportacoes + ' mil €' : null),
    dataRow('Importações', d.importacoes != null ? d.importacoes + ' mil €' : null),
    dataRow('NUTS III', d.nuts),
  ].forEach(r => r && ecSec.appendChild(r));
  grid.appendChild(ecSec);

  main.appendChild(grid);
  wrap.appendChild(main);
}
</script>
</body>
</html>
