<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Em breve · PSD Distrital de Vila Real</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800;900&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --laranja: #F47920; --tinta: #231F20; --papel: #FBF8F3;
      --borda: rgba(35,31,32,.08); --muted: #8A7F73;
      --grad: linear-gradient(150deg,#F47920,#ED1C24);
      --grad90: linear-gradient(90deg,#F47920,#ED1C24);
      --max: 1260px; --px: 30px; --nav-h: 76px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Hanken Grotesk', sans-serif; color: var(--tinta); background: var(--papel); -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }
    a { text-decoration: none; color: inherit; }
    img { display: block; }
    ::selection { background: var(--laranja); color: #fff; }
    .container { max-width: var(--max); margin: 0 auto; padding: 0 var(--px); }

    .navbar { background: rgba(251,248,243,.88); backdrop-filter: blur(14px); border-bottom: 1px solid var(--borda); }
    .navbar-inner { height: var(--nav-h); display: flex; align-items: center; gap: 26px; }
    .navbar-brand { display: flex; align-items: center; gap: 13px; }
    .navbar-brand img { height: 34px; width: auto; }
    .navbar-brand-text { font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 12px; letter-spacing: .05em; text-transform: uppercase; line-height: 1.15; border-left: 1px solid rgba(35,31,32,.15); padding-left: 13px; }
    .navbar-nav { margin-left: auto; display: flex; align-items: center; gap: 2px; }
    .nav-link { font-size: 15px; font-weight: 600; color: #4a443e; padding: 9px 12px; border-radius: 8px; transition: color .18s, background .18s; }
    .nav-link:hover { color: var(--laranja); background: rgba(244,121,32,.08); }
    .btn-pill { font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 14px; color: #fff; background: var(--laranja); padding: 11px 20px; border-radius: 999px; margin-left: 10px; transition: background .18s; display: inline-block; }
    .btn-pill:hover { background: var(--tinta); }

    .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 80px var(--px); text-align: center; }
    .em-breve-icon {
      width: 80px; height: 80px; border-radius: 22px; background: var(--grad);
      margin: 0 auto 28px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Archivo', sans-serif; font-weight: 900; font-size: 32px; color: #fff;
    }
    .em-breve-section { font-size: 13px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--laranja); margin-bottom: 16px; }
    .em-breve-h1 { font-family: 'Archivo', sans-serif; font-weight: 900; font-size: clamp(32px,4vw,52px); line-height: 1.02; margin-bottom: 18px; }
    .em-breve-p { font-size: 18px; line-height: 1.6; color: #534B44; max-width: 460px; margin: 0 auto 32px; }
    .grad-bar { width: 68px; height: 5px; background: var(--grad90); border-radius: 3px; margin: 0 auto 32px; }
    .back-btn {
      font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 15px;
      color: var(--tinta); border: 1.5px solid rgba(35,31,32,.18);
      padding: 13px 26px; border-radius: 999px; display: inline-block;
      transition: border-color .18s, background .18s, color .18s;
    }
    .back-btn:hover { background: var(--tinta); color: #fff; border-color: var(--tinta); }

    @media (max-width: 900px) { :root { --px: 20px; } .navbar-nav { display: none; } }
    :focus-visible { outline: 2px solid var(--laranja); outline-offset: 3px; border-radius: 4px; }
  </style>
</head>
<body>

<header class="navbar" role="banner">
  <div class="container navbar-inner">
    <a href="index.html" class="navbar-brand">
      <img src="assets/logo-psd.png" alt="Logótipo PSD" style="height:34px">
      <span class="navbar-brand-text">Distrital de<br>Vila Real</span>
    </a>
    <nav class="navbar-nav">
      <a href="index.html#sobre"     class="nav-link">Distrital</a>
      <a href="index.html#concelhos" class="nav-link">Concelhos</a>
      <a href="index.html#equipa"    class="nav-link">Órgãos</a>
      <a href="index.html#noticias"  class="nav-link">Notícias</a>
      <a href="index.html#agenda"    class="nav-link">Agenda</a>
      <a href="index.html#militante" class="btn-pill">Tornar-se militante →</a>
    </nav>
  </div>
</header>

<main class="main">
  <div>
    <div class="em-breve-icon" id="section-icon" aria-hidden="true">⋯</div>
    <div class="em-breve-section" id="section-name">Órgãos Distritais</div>
    <h1 class="em-breve-h1">Página em preparação.</h1>
    <div class="grad-bar" aria-hidden="true"></div>
    <p class="em-breve-p">Esta secção está a ser preparada e estará disponível em breve. Contacte-nos para mais informações.</p>
    <a href="index.html#equipa" class="back-btn">← Voltar aos órgãos</a>
  </div>
</main>

<script>
const params = new URLSearchParams(window.location.search);
const s = params.get('s');
if (s) document.getElementById('section-name').textContent = s;
</script>
</body>
</html>
